{% extends "base.html" %}
{% block title %}Edit Schedules{% endblock %}
{% block content %} <br>
<h1 align="center">Edit Schedules</h1>
<form method="POST" style="max-width: 600px; margin: auto;">
    <!-- Class dropdown -->
    <div class="form-group">
        <label for="class_level">Class Level</label>
        <select name="class_level" id="class_level" class="form-control" required onchange="loadSchedule()">
            <option value="">Select class</option>
            <option value="Rose">Rose</option>
            <option value="Adult">Adult</option>
            <option value="Teen">Teen</option>
            <option value="Junior">Junior</option>
            <option value="Mini">Mini</option>
        </select>
    </div>
    <!-- Textarea -->
    <div class="form-group">
        <label for="content">Schedule Content</label>
        <textarea
            name="content"
            id="content"
            class="form-control"
            rows="6"
            placeholder="Select a class to load schedule..."
            required></textarea>
    </div>
    <div style="text-align: center;">
        <button type="submit" class="btn btn-primary" style="background-color: #8E5A8C; border-color: #8E5A8C">
            Save Schedule
        </button>
    </div>
</form>   <!-- ✅ Close the save form here, before the schedules section -->

<br>
<h2 align="center">Current Schedules</h2>
<div style="max-width: 600px; margin: auto;">
    {% for schedule in schedules %}
        <div style="border: 1px solid #ccc; padding: 10px; margin-bottom: 10px; border-radius: 6px; position: relative;">
            
            <!-- Delete button (top-right) — now in its own standalone form, no nesting -->
            <form method="POST" action="{{ url_for('auth.delete_schedule', id=schedule.id) }}"
                  onsubmit="return confirm('Delete this schedule?')"
                  style="position: absolute; top: 8px; right: 8px;">
                <button type="submit" 
                        style="background-color: #dc3545; color: white; border: none; padding: 4px 8px; border-radius: 4px;">
                    ✕
                </button>
            </form>

            <strong>{{ schedule.class_level }}</strong>
            <pre style="white-space: pre-wrap; margin-top: 5px;">{{ schedule.content }}</pre>
        </div>
    {% else %}
        <p>No schedules yet.</p>
    {% endfor %}
</div>

<br>

<script>
    const schedules = {
        {% for schedule in schedules %}
            "{{ schedule.class_level }}": {{ schedule.content | tojson }},
        {% endfor %}
    };
    function loadSchedule() {
        const selected = document.getElementById("class_level").value;
        const textarea = document.getElementById("content");
        if (schedules[selected]) {
            textarea.value = schedules[selected];
        } else {
            textarea.value = "";
        }
    }
</script>
{% endblock %}
