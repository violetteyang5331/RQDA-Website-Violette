{% extends "base.html" %} 
{% block title %}Gallery{% endblock %}
{% block content %}
<style>
    /* GALLERY LAYOUT */
    .gallery {
      column-count: 3;
      column-gap: 15px;
      padding: 15px;
    }
    /* RESPONSIVE */
    @media (max-width: 1000px) {
      .gallery { column-count: 3; }
    }
    @media (max-width: 768px) {
      .gallery { column-count: 2; }
    }

    /* BLUR-UP */
    .gallery img {
      width: 100%;
      margin-bottom: 15px;
      border-radius: 12px;
      cursor: pointer;
      display: block;
      filter: blur(10px);
      transition: filter 0.4s ease, transform 0.2s ease;
    }
    .gallery img.loaded {
      filter: blur(0);
    }
    /*
    .gallery img:hover {
      transform: scale(1.02);
    }
    */

    /* LIGHTBOX */
    .lightbox {
      display: none;
      position: fixed;
      z-index: 1000;
      padding-top: 50px;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(0,0,0,0.9);
      text-align: center;
    }
    .lightbox img {
      max-width: 90%;
      max-height: 80%;
      border-radius: 10px;
      filter: none;
    }
    .close {
      position: absolute;
      top: 20px;
      right: 40px;
      font-size: 40px;
      color: white;
      text-decoration: none;
      cursor: pointer;
    }
</style>

<h1 class="text-center mt-4 mb-3">Gallery</h1>

<div class="gallery" id="gallery">
  {% for img in images %}
    <img
      src="{{ url_for('static', filename='images/' + img.replace('.webp', '_placeholder.webp')) }}"
      data-src="{{ url_for('static', filename='images/' + img) }}"
      class="blurry">
  {% endfor %}
</div>

<!-- LIGHTBOX -->
<div id="lightbox" class="lightbox">
  <span class="close">&times;</span>
  <img id="lightbox-img">
</div>

<script>
  // Blur-up: swap placeholder → full image when loaded
  document.querySelectorAll("img.blurry").forEach(img => {
    const full = new Image();
    full.src = img.dataset.src;
    full.onload = () => {
      img.src = img.dataset.src;
      img.classList.add("loaded");
    };
  });

  // Lightbox
  const lightbox = document.getElementById("lightbox");
  const lightboxImg = document.getElementById("lightbox-img");

  document.querySelectorAll("#gallery img").forEach(img => {
    img.addEventListener("click", () => {
      // Show full image in lightbox, not placeholder
      lightboxImg.src = img.dataset.src || img.src;
      lightbox.style.display = "block";
    });
  });

  document.querySelector(".close").addEventListener("click", () => {
    lightbox.style.display = "none";
  });

  lightbox.addEventListener("click", (e) => {
    if (e.target === lightbox) {
      lightbox.style.display = "none";
    }
  });
</script>
{% endblock %}
