{% extends "base.html" %}

{% block title %}Sign Up{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-6 col-md-8 col-sm-10">
            <form method="POST" class="p-4" style="border-radius: 8px;">
                <h3 class="text-center mb-4">Sign Up</h3>

                <div class="form-group">
                    <label for="rqda_level">RQDA Level</label>
                    <select class="form-control" id="rqda_level" name="rqda_level">
                        <option value="" disabled selected>Select your RQDA Level</option>
                        <option value="adult">Adult</option>
                        <option value="teen">Teen</option>
                        <option value="junior">Junior</option>
                        <option value="mini">Mini</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input 
                        type="email" 
                        class="form-control" 
                        id="email" 
                        name="email" 
                        placeholder="enter email" 
                    />
                </div>

                <div class="form-group">
                    <label for="firstName">Student First Name</label>
                    <input 
                        type="text" 
                        class="form-control" 
                        id="firstName" 
                        name="firstName" 
                        placeholder="enter first name" 
                    />
                </div>

                <div class="form-group">
                    <label for="lastName">Student Last Name</label>
                    <input 
                        type="text" 
                        class="form-control" 
                        id="lastName" 
                        name="lastName" 
                        placeholder="enter last name" 
                    />
                </div>

                <div class="form-group">
                    <label for="birthday_md">Student Birthday (MM-DD)</label>
                    <input 
                        type="text" 
                        class="form-control" 
                        id="birthday_md" 
                        name="birthday_md" 
                        placeholder="MM-DD" 
                        maxlength="5"
                        pattern="\d{2}-\d{2}"
                    />
                </div>

                <div class="form-group">
                    <label for="password1">Password</label>
                    <input 
                        type="password" 
                        class="form-control" 
                        id="password1" 
                        name="password1" 
                        placeholder="enter password" 
                    />
                </div>

                <div class="form-group">
                    <label for="password2">Password (Confirm)</label>
                    <input 
                        type="password" 
                        class="form-control" 
                        id="password2" 
                        name="password2" 
                        placeholder="confirm password" 
                    />
                </div>

                <div class="text-center mt-3">
                    <button type="submit" class="btn btn-primary px-4">Submit</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
